name: Feature request
description: Propose a new feature or implementation task
title: "[Feature] "
labels:
  - feature
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the feature
    validations:
      required: true
  - type: dropdown
    id: team
    attributes:
      label: Owning team
      options:
        - CSE
        - SE
        - ECE
        - Shared
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0
        - P1
        - P2
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Define what must be true for this to be complete
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List other tasks, modules, or teams this depends on

