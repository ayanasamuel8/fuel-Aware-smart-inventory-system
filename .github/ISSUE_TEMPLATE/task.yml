name: Task
description: Create a focused implementation or documentation task
title: "[Task] "
labels:
  - task
body:
  - type: input
    id: summary
    attributes:
      label: Task summary
    validations:
      required: true
  - type: dropdown
    id: owner
    attributes:
      label: Owning team
      options:
        - CSE
        - SE
        - ECE
        - Shared
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Expected output
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of done
    validations:
      required: true
  - type: textarea
    id: blockers
    attributes:
      label: Known blockers or dependencies

